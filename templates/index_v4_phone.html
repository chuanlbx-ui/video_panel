<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>滇边AI·视频工坊</title>
<link rel="stylesheet" href="index_v4_phone.css">
</head>
<body>

<div class="page" id="app">

<div class="screen active" id="screenLogin">
  <div class="login-screen">
    <div class="login-logo">&#10022; 滇边AI</div>
    <div class="login-sub">文山州互联网协会 &#183; AI视频工坊</div>
    <div class="login-tabs">
      <button class="login-tab active" data-tab="login">登录</button>
      <button class="login-tab" data-tab="register">注册</button>
    </div>
    <div id="loginForm">
      <input class="login-input" id="loginPhone" placeholder="手机号" type="tel" maxlength="11" autocomplete="tel">
      <input class="login-input" id="loginPassword" placeholder="密码" type="password" maxlength="32" autocomplete="current-password">
      <div class="login-error" id="loginError"></div>
      <button class="login-btn" id="loginBtn">&#128640; 登录</button>
    </div>
    <div id="registerForm" style="display:none">
      <input class="login-input" id="regName" placeholder="姓名" type="text" maxlength="20">
      <input class="login-input" id="regPhone" placeholder="手机号" type="tel" maxlength="11">
      <input class="login-input" id="regPassword" placeholder="密码（6位以上）" type="password" maxlength="32">
      <input class="login-input" id="regInvite" placeholder="邀请码（选填）" type="text" maxlength="12">
      <div class="login-error" id="regError"></div>
      <button class="login-btn" id="regBtn">&#127881; 注册</button>
    </div>
    <div class="login-hint" id="loginHint">输入手机号和密码即可登录</div>
  </div>
</div>

<div class="steps-bar" id="stepsBar">
  <div class="step-dot active"></div>
  <div class="step-dot"></div>
  <div class="step-dot"></div>
</div>

<div class="screen" id="screenTpl">
  <div class="tpl-header">
    <div class="user" id="userInfo">&#128075; <strong>你好</strong></div>
    <div class="header-actions">
      <span class="history-btn" id="historyBtn" title="历史视频" onclick="loadHistory();showScreen('History')">&#128196;</span>
      <span class="settings-btn" id="settingsBtn" title="设置" onclick="loadSettings();showScreen('Settings')">&#9881;&#65039;</span>
    </div>
  </div>
  <div class="screen-title">选择视频类型</div>
  <div class="tpl-grid" id="tplGrid">
    <!-- 骨架屏占位 -->
    <div class="tpl-card skeleton"><div class="sk-img"></div><div class="sk-text"></div><div class="sk-text sk-short"></div></div>
    <div class="tpl-card skeleton"><div class="sk-img"></div><div class="sk-text"></div><div class="sk-text sk-short"></div></div>
    <div class="tpl-card skeleton"><div class="sk-img"></div><div class="sk-text"></div><div class="sk-text sk-short"></div></div>
  </div>
  <div class="screen-title" style="margin-top:8px;">或选择视频类型</div>
  <div class="tpl-tags" id="tplTags"></div>
</div>

<div class="screen" id="screenForm">
  <div class="screen-title" id="formTitle">填写信息</div>
  <div class="form-card" id="formFields"></div>
  <div style="display:flex;gap:10px;padding:0 0 16px;">
    <button class="btn-secondary" onclick="showScreen('Tpl')">&#8592; 返回</button>
    <button class="btn-primary" id="generateBtn" style="flex:1">&#127916; 生成视频</button>
    <button class="btn-accent" id="previewCopyBtn">AI文案&#9889;</button>
  </div>
</div>

<div class="screen" id="screenProgress">
  <div class="screen-title">渲染中 ...</div>
  <div class="progress-card">
    <div class="progress-ring" id="progressRing">
      <svg viewBox="0 0 100 100">
        <circle class="progress-bg" cx="50" cy="50" r="42"/>
        <circle class="progress-fill" id="progressFill" cx="50" cy="50" r="42"/>
      </svg>
      <div class="progress-text" id="progressText">0%</div>
    </div>
    <div class="progress-status" id="progressStatus">正在准备...</div>
    <button class="btn-secondary btn-sm" onclick="minimizeProgress()">&#128197; 后台渲染</button>
  </div>
</div>

<div class="screen" id="screenFinish">
  <div class="finish-screen">
    <div class="finish-icon">&#127881;</div>
    <div class="finish-title">视频生成成功！</div>
    <div class="finish-video">
      <video id="previewVideo" controls playsinline preload="metadata" style="width:100%;border-radius:12px;"></video>
    </div>
    <div class="finish-actions">
      <button class="btn-primary" id="downloadBtn" style="flex:1">&#128229; 下载</button>
      <button class="btn-accent" id="shareBtn">&#128172; 分享</button>
    </div>
    <div class="finish-share" id="sharePanel" style="display:none;">
      <button class="btn-secondary btn-sm" onclick="navigator.clipboard.writeText('用滇边AI做视频，超简单！'); toast('已复制链接');">复制链接</button>
      <button class="btn-secondary btn-sm" onclick="pushToWechat()">微信推送</button>
    </div>
  </div>
</div>

<div class="screen" id="screenSettings" style="padding:0 16px 80px;">
  <div class="screen-title">账号设置</div>
  <div class="settings-card skeleton" id="settingsSkeleton">
    <div class="sk-item"><div class="sk-label"></div><div class="sk-val sk-short"></div></div>
    <div class="sk-item"><div class="sk-label"></div><div class="sk-val sk-short"></div></div>
    <div class="sk-item"><div class="sk-label"></div><div class="sk-val sk-short"></div></div>
    <div class="sk-item"><div class="sk-label"></div><div class="sk-val sk-short"></div></div>
  </div>
  <div id="settingsContent" style="display:none;">
    <div class="settings-card">
      <div class="settings-item"><span class="settings-label">账号</span><span id="setPhone">--</span></div>
      <div class="settings-item"><span class="settings-label">姓名</span><span id="setName">--</span></div>
      <div class="settings-item"><span class="settings-label">角色</span><span id="setRole">--</span></div>
      <div class="settings-item"><span class="settings-label">API Key</span><span id="setApiKey" style="font-size:12px;word-break:break-all;">--</span></div>
    </div>
    <button class="btn-primary btn-sm" onclick="generateApiKey()" style="margin-bottom:8px;">🔑 生成API Key</button>
    <button class="btn-secondary btn-sm" onclick="copyApiKey()">📋 复制API Key</button>
    <div style="margin-top:16px;">
      <button class="btn-danger btn-sm" onclick="logout()">🚪 退出登录</button>
    </div>
  </div>
  <div class="error-boundary" id="settingsError" style="display:none;"></div>
</div>

<div class="screen" id="screenHistory" style="padding:0 16px 80px;">
  <div class="screen-title">我的视频</div>
  <div class="error-boundary" id="historyError" style="display:none;"></div>
  <div class="history-list-skeleton" id="historySkeleton">
    <div class="sk-history"><div class="sk-icon"></div><div class="sk-info"><div class="sk-text"></div><div class="sk-text sk-short"></div></div></div>
    <div class="sk-history"><div class="sk-icon"></div><div class="sk-info"><div class="sk-text"></div><div class="sk-text sk-short"></div></div></div>
    <div class="sk-history"><div class="sk-icon"></div><div class="sk-info"><div class="sk-text"></div><div class="sk-text sk-short"></div></div></div>
  </div>
  <div class="history-list" id="historyList"></div>
</div>

<div id="toast"></div>
</div>

<!-- JS模块 -->
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/templates.js"></script>
<script src="js/video.js"></script>
<script src="js/app.js"></script>

</body>
</html>
