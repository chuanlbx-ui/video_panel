<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>滇边AI·视频工坊</title>
<link rel="stylesheet" href="index_v4_phone.css?v=5.4">
</head>
<body>

<div class="page" id="app">

<!-- ====== 登录页（全屏，无三明治） ====== -->
<div class="screen active" id="screenLogin">
  <div class="login-screen">
    <div class="login-logo">✦ 滇边AI</div>
    <div class="login-sub">文山州互联网协会 · AI视频工坊</div>
    <div class="login-tabs">
      <button class="login-tab active" data-tab="login" onclick="switchLoginTab('login')">登录</button>
      <button class="login-tab" data-tab="register" onclick="switchLoginTab('register')">注册</button>
    </div>
    <div id="loginForm">
      <input class="login-input" id="loginPhone" placeholder="手机号" type="tel" maxlength="11" autocomplete="tel">
      <input class="login-input" id="loginPassword" placeholder="密码" type="password" maxlength="32" autocomplete="current-password">
      <div class="login-error" id="loginError"></div>
      <button class="login-btn" id="loginBtn">🚀 登录</button>
    </div>
    <div id="registerForm" style="display:none">
      <input class="login-input" id="regName" placeholder="姓名" type="text" maxlength="20">
      <input class="login-input" id="regPhone" placeholder="手机号" type="tel" maxlength="11">
      <input class="login-input" id="regPassword" placeholder="密码（6位以上）" type="password" maxlength="32">
      <input class="login-input" id="regInvite" placeholder="邀请码（选填）" type="text" maxlength="12">
      <div class="login-error" id="regError"></div>
      <button class="login-btn" id="regBtn">🎉 注册</button>
    </div>
    <div class="login-hint" id="loginHint">输入手机号和密码即可登录</div>
  </div>
</div>

<!-- ====== 三明治结构（登录后页面） ====== -->
<div id="sandwich" class="sandwich" style="display:none;">

  <!-- 顶部栏 -->
  <div class="top-bar" id="topBar">
    <div class="top-left">
      <span class="top-logo">✦ 滇边AI</span>
    </div>
    <div class="top-center">
      <span class="top-title" id="topTitle">创作</span>
    </div>
    <div class="top-right">
      <span class="top-avatar" id="topAvatar" onclick="loadSettings();showScreen('Settings')">👤</span>
    </div>
  </div>

  <!-- 步骤指示器（嵌入顶部） -->
  <div class="steps-bar" id="stepsBar">
    <div class="step-item active" data-step="0">
      <div class="step-dot"></div>
      <div class="step-label">选模板</div>
    </div>
    <div class="step-connector"></div>
    <div class="step-item" data-step="1">
      <div class="step-dot"></div>
      <div class="step-label">填信息</div>
    </div>
    <div class="step-connector"></div>
    <div class="step-item" data-step="2">
      <div class="step-dot"></div>
      <div class="step-label">完成</div>
    </div>
  </div>

  <!-- 内容区（可滚动） -->
  <div class="content-scroll" id="contentScroll">

    <div class="screen" id="screenTpl">
      <div class="screen-title">选择视频类型</div>
      <div class="tpl-search" id="tplSearchWrap">
        <input class="tpl-search-input" id="tplSearchInput" placeholder="🔍 搜索模板..." type="search" autocomplete="off">
      </div>
      <div class="tpl-tags" id="tplTags"></div>
      <div class="tpl-grid" id="tplGrid">
        <div class="tpl-card skeleton"><div class="sk-img"></div><div class="sk-text"></div><div class="sk-text sk-short"></div></div>
        <div class="tpl-card skeleton"><div class="sk-img"></div><div class="sk-text"></div><div class="sk-text sk-short"></div></div>
        <div class="tpl-card skeleton"><div class="sk-img"></div><div class="sk-text"></div><div class="sk-text sk-short"></div></div>
      </div>
      <!-- AI智能生成区 -->
      <div class="ai-zone" id="aiZone" style="margin-top:16px;">
        <div class="ai-zone-header">✨ AI智能生成</div>
        <div class="ai-input-wrap">
          <textarea class="ai-input" id="aiInput" placeholder="一句话描述你要的视频，例如：文山三七品牌宣传片" rows="2"></textarea>
          <button class="ai-go-btn" id="aiGoBtn" onclick="aiOneShot()">🚀</button>
        </div>
        <div class="ai-hints" id="aiHints">
          <span class="ai-hint" onclick="fillAiExample('文山三七，传承千年养生智慧')">三七品牌</span>
          <span class="ai-hint" onclick="fillAiExample('老街米线店，三代人传承的味道')">餐饮推广</span>
          <span class="ai-hint" onclick="fillAiExample('邀请好友来协会共话AI未来')">协会邀请</span>
          <span class="ai-hint" onclick="fillAiExample('立夏学习会，5月5日开启')">活动邀约</span>
        </div>
        <div class="ai-preview" id="aiPreview" style="display:none;"></div>
        <div class="ai-history" id="aiHistory"></div>
      </div>
    </div>

    <div class="screen" id="screenForm">
      <div class="screen-title" id="formTitle">填写信息</div>
      <div class="form-card" id="formFields"></div>
      <div style="display:flex;gap:10px;padding:0 0 16px;">
        <button class="btn-secondary" onclick="showScreen('Tpl')">← 返回</button>
        <button class="btn-primary" id="generateBtn" style="flex:1">🎬 生成视频</button>
        <button class="btn-accent" id="previewCopyBtn">AI文案⚡</button>
      </div>
    </div>

    <div class="screen" id="screenProgress">
      <div class="progress-card">
        <div class="progress-ring" id="progressRing">
          <svg viewBox="0 0 100 100">
            <circle class="progress-bg" cx="50" cy="50" r="42"/>
            <circle class="progress-fill" id="progressFill" cx="50" cy="50" r="42"/>
          </svg>
          <div class="progress-pct" id="progressPct">0%</div>
        </div>
        <div class="progress-text" id="progressText">正在准备...</div>
        <div class="progress-hint" id="progressHint"></div>
        <button class="btn-secondary btn-sm" onclick="minimizeProgress()">📅 后台渲染</button>
      </div>
    </div>

    <div class="screen" id="screenFinish">
      <div class="finish-screen">
        <div class="finish-icon">🎉</div>
        <div class="finish-title">视频生成成功！</div>
        <div class="finish-video">
          <video id="finishVideo" controls playsinline preload="metadata" style="width:100%;border-radius:12px;"></video>
        </div>
        <div class="finish-actions">
          <button class="btn-primary" id="downloadBtn" style="flex:1">📥 下载</button>
          <button class="btn-accent" id="shareBtn">💬 分享</button>
        </div>
      </div>
    </div>

    <div class="screen" id="screenSettings" style="padding:0 0 80px;">
      <div class="screen-title">账号设置</div>
      <div class="settings-card skeleton" id="settingsSkeleton">
        <div class="sk-item"><div class="sk-label"></div><div class="sk-val sk-short"></div></div>
        <div class="sk-item"><div class="sk-label"></div><div class="sk-val sk-short"></div></div>
        <div class="sk-item"><div class="sk-label"></div><div class="sk-val sk-short"></div></div>
        <div class="sk-item"><div class="sk-label"></div><div class="sk-val sk-short"></div></div>
      </div>
      <div id="settingsContent" style="display:none;">
        <div class="settings-card">
          <div class="settings-item"><span class="settings-label">账号</span><span id="setPhone">--</span></div>
          <div class="settings-item"><span class="settings-label">姓名</span><span id="setName">--</span></div>
          <div class="settings-item"><span class="settings-label">角色</span><span id="setRole">--</span></div>
          <div class="settings-item"><span class="settings-label">API Key</span><span id="setApiKey" style="font-size:12px;word-break:break-all;">--</span></div>
        </div>
        <button class="btn-primary btn-sm" onclick="generateApiKey()" style="margin-bottom:8px;">🔑 生成API Key</button>
        <button class="btn-secondary btn-sm" onclick="copyApiKey()">📋 复制API Key</button>
        <div style="margin-top:16px;">
          <button class="btn-danger btn-sm" onclick="logout()">🚪 退出登录</button>
        </div>
      </div>
      <div class="error-boundary" id="settingsError" style="display:none;"></div>
    </div>

    <div class="screen" id="screenHistory" style="padding:0 0 80px;">
      <div class="screen-title">我的视频</div>
      <div class="error-boundary" id="historyError" style="display:none;"></div>
      <div class="history-list-skeleton" id="historySkeleton">
        <div class="sk-history"><div class="sk-icon"></div><div class="sk-info"><div class="sk-text"></div><div class="sk-text sk-short"></div></div></div>
        <div class="sk-history"><div class="sk-icon"></div><div class="sk-info"><div class="sk-text"></div><div class="sk-text sk-short"></div></div></div>
        <div class="sk-history"><div class="sk-icon"></div><div class="sk-info"><div class="sk-text"></div><div class="sk-text sk-short"></div></div></div>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>

  </div>

  <!-- 底部导航栏 -->
  <div class="bottom-nav" id="bottomNav">
    <div class="nav-item active" data-tab="home" onclick="switchTab('home')">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">创作</span>
    </div>
    <div class="nav-item" data-tab="history" onclick="switchTab('history')">
      <span class="nav-icon">🎬</span>
      <span class="nav-label">历史</span>
    </div>
    <div class="nav-item" data-tab="mine" onclick="switchTab('mine')">
      <span class="nav-icon">👤</span>
      <span class="nav-label">我的</span>
    </div>
  </div>

</div>

<div id="toast"></div>

<!-- ====== V5.0 AI区域（插入在screenTpl内） ====== -->
<div class="ai-zone" id="aiZone" style="margin-top:4px;">
  <div class="ai-zone-header">✨ AI智能生成</div>
  <div class="ai-input-wrap">
    <textarea class="ai-input" id="aiInput" placeholder="一句话描述你要的视频，例如：文山三七品牌宣传片" rows="2"></textarea>
    <button class="ai-go-btn" id="aiGoBtn" onclick="aiOneShot()">🚀</button>
  </div>
  <div class="ai-hints" id="aiHints">
    <span class="ai-hint" onclick="fillAiExample('文山三七，传承千年养生智慧')">三七品牌</span>
    <span class="ai-hint" onclick="fillAiExample('老街米线店，三代人传承的味道')">餐饮推广</span>
    <span class="ai-hint" onclick="fillAiExample('邀请好友来协会共话AI未来')">协会邀请</span>
    <span class="ai-hint" onclick="fillAiExample('立夏学习会，5月5日开启')">活动邀约</span>
  </div>
  <div class="ai-preview" id="aiPreview" style="display:none;"></div>
  <div class="ai-history" id="aiHistory"></div>
</div>

</div>

<!-- 行业变体选择弹窗 -->
<div class="variant-overlay" id="industryVariantOverlay">
  <div class="variant-modal">
    <div class="vm-header">
      <div class="vm-title" id="industryVariantTitle">选择行业风格</div>
      <div class="vm-close" onclick="closeIndustryVariant()">✕</div>
    </div>
    <div class="vm-list" id="industryVariantList"></div>
    <div class="vm-actions">
      <button class="btn-cancel" onclick="closeIndustryVariant()">跳过</button>
      <button class="btn-apply" onclick="confirmIndustryVariant()">✅ 确定选择</button>
    </div>
  </div>
</div>

<!-- V5.1: 文案预览弹窗 -->
<div class="ai-modal-overlay" id="aiModalOverlay">
  <div class="ai-modal">
    <div class="ai-modal-title">📝 编辑文案</div>
    <div class="ai-modal-tpl" id="aiModalTpl"></div>
    <div id="aiModalScenes"></div>
    <div class="ai-modal-section">
      <div class="ai-modal-label">🎙️ 配音文案</div>
      <textarea class="ai-modal-textarea voiceover" id="aiModalVoiceover" rows="3"></textarea>
    </div>
    <div class="ai-modal-actions">
      <button class="btn-cancel" onclick="aiModalCancel()">取消</button>
      <button class="btn-apply" id="aiModalApplyBtn" onclick="aiModalApply()">✅ 确认生成</button>
    </div>
  </div>
</div>

<!-- JS模块 -->
<script src="js/app.js?v=5.2"></script>
<script src="js/auth.js?v=5.2"></script>
<script src="js/ui.js?v=5.2"></script>
<script src="js/templates.js?v=5.2"></script>
<script src="js/video.js?v=5.2"></script>

</body>
</html>
